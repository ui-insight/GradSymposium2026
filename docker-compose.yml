services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gpsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gpsa}
      POSTGRES_DB: ${POSTGRES_DB:-gpsa}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gpsa}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gpsa-net

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      GPSA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gpsa}:${POSTGRES_PASSWORD:-gpsa}@db:5432/${POSTGRES_DB:-gpsa}
      GPSA_SECRET_KEY: ${GPSA_SECRET_KEY:-dev-secret-change-in-production}
      GPSA_DEV_MODE: ${GPSA_DEV_MODE:-true}
      GPSA_CORS_ORIGINS: ${GPSA_CORS_ORIGINS:-http://localhost:${HOST_PORT:-8080}}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gpsa-net

  frontend:
    build: ./frontend
    ports:
      - "${HOST_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - gpsa-net

volumes:
  pgdata:

networks:
  gpsa-net:
    driver: bridge
